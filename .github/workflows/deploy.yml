name: Deploy to GitHub Pages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Setup Git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
    - name: Prepare deployment
      run: |
        VERSION=${{ github.ref_name }}
        VERSION=${VERSION#v}
        echo "🔄 Deploying version: v$VERSION"
        
        # Создаем папку для версии
        mkdir -p "v$VERSION"
        
        # Копируем файлы
        cp -r ru en index.html "v$VERSION/"
        
        # Обновляем пути в HTML файлах
        find "v$VERSION" -name "*.html" -exec sed -i 's|href="../|href="/dsa-lab4/v$VERSION/|g' {} \;
        find "v$VERSION" -name "*.html" -exec sed -i 's|href="ru/|href="/dsa-lab4/v$VERSION/ru/|g' {} \;
        find "v$VERSION" -name "*.html" -exec sed -i 's|href="en/|href="/dsa-lab4/v$VERSION/en/|g' {} \;
        
    - name: Deploy to gh-pages
      run: |
        git fetch origin gh-pages
        git checkout gh-pages
        
        # Копируем папку с версией
        cp -r "v${{ github.ref_name#v }}"/* .
        
        git add .
        git commit -m "🚀 Deploy ${{ github.ref_name }}" || echo "No changes"
        git push origin gh-pages