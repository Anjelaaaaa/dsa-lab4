name: Deploy to GitHub Pages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Setup Git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
    - name: Get version and prepare deployment
      run: |
        # ПРАВИЛЬНОЕ извлечение версии из тега
        VERSION=${{ github.ref_name }}
        # Убираем 'v' из начала, если есть
        VERSION=${VERSION#v}
        echo "🔄 Deploying version: v$VERSION"
        echo "GitHub Ref: ${{ github.ref }}"
        echo "GitHub Ref Name: ${{ github.ref_name }}"
        
        # Создаем директорию для версии
        mkdir -p "deploy/v$VERSION"
        
        # Копируем файлы в версионную директорию
        cp -r ru en index.html "deploy/v$VERSION/"
        
        echo "📁 Files copied to deploy/v$VERSION"
        
        # Обновляем пути в HTML файлах для версионного деплоя
        find "deploy/v$VERSION" -name "*.html" -exec sed -i 's|href="../|href="/dsa-lab4/v$VERSION/|g' {} \;
        find "deploy/v$VERSION" -name "*.html" -exec sed -i 's|href="ru/|href="/dsa-lab4/v$VERSION/ru/|g' {} \;
        find "deploy/v$VERSION" -name "*.html" -exec sed -i 's|href="en/|href="/dsa-lab4/v$VERSION/en/|g' {} \;
        
        echo "✅ Paths updated for version v$VERSION"
        
    - name: Deploy to gh-pages branch
      run: |
        echo "🚀 Starting deployment to gh-pages..."
        git fetch origin gh-pages
        git checkout gh-pages
        
        # Копируем ВСЮ папку deploy, а не только содержимое версии
        cp -r deploy/* .
        
        echo "📋 Current structure:"
        ls -la
        
        git add .
        git status
        git commit -m "🚀 Deploy version v$VERSION" || echo "No changes to commit"
        git push origin gh-pages
        echo "🎉 Successfully deployed v$VERSION"